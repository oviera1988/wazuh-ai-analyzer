services:
  backend:
    build: ./backend
    container_name: wazuh-ai-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/wazuh_alerts.db
    volumes:
      - /docker/wazuh-ai-analyzer/data:/app/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: wazuh-ai-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
    name: wazuh-ai-net
